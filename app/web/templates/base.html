<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>{% block title %}Streaklet{% endblock %}</title>

    <!-- PWA Meta Tags -->
    <meta name="description" content="A self-hosted daily streak tracker for maintaining consistent habits">
    <meta name="theme-color" content="#3b82f6">
    <link rel="manifest" href="/static/manifest.json">

    <!-- Apple iOS Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Streaklet">
    <link rel="apple-touch-icon" href="/static/icons/icon-192x192.png">

    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="/static/icons/icon-72x72.png">

    <link rel="stylesheet" href="/static/css/style.css?v={{ cache_bust }}">
    <link rel="stylesheet" href="/static/css/components.css?v={{ cache_bust }}">
    {% block extra_css %}{% endblock %}
    <!-- Material Design Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@mdi/font@7.4.47/css/materialdesignicons.min.css">
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://unpkg.com/@alpinejs/collapse@3.13.3/dist/cdn.min.js" defer></script>
    <script src="https://unpkg.com/alpinejs@3.13.3/dist/cdn.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>

    <!-- Streaklet Utilities - Consolidated formatters and helpers -->
    <script src="/static/js/utils.js?v={{ cache_bust }}"></script>

    <!-- Streaklet API Client - Unified HTTP request wrapper -->
    <script src="/static/js/api-client.js?v={{ cache_bust }}"></script>

    <script>
        // Alpine.js profile store - manages profile selection via localStorage
        document.addEventListener('alpine:init', () => {
            // Migrate from localStorage to cookies (one-time migration)
            const localStorageProfileId = window.streakletStorage.get(window.streakletStorageKeys.profileId);
            const localStorageProfileName = window.streakletStorage.get(window.streakletStorageKeys.profileName);
            if (localStorageProfileId && !window.streakletCookies.get('profile_id')) {
                window.streakletCookies.set('profile_id', localStorageProfileId);
                window.streakletCookies.set('profile_name', localStorageProfileName || '');
                // Clean up localStorage after migration
                window.streakletStorage.remove(window.streakletStorageKeys.profileId);
                window.streakletStorage.remove(window.streakletStorageKeys.profileName);
            }

            Alpine.store('profile', {
                id: parseInt(window.streakletCookies.get('profile_id')) || null,
                name: window.streakletCookies.get('profile_name') || null,

                setProfile(id, name) {
                    this.id = id;
                    this.name = name;
                    window.streakletCookies.set('profile_id', id);
                    window.streakletCookies.set('profile_name', name || '');
                },

                clearProfile() {
                    this.id = null;
                    this.name = null;
                    window.streakletCookies.remove('profile_id');
                    window.streakletCookies.remove('profile_name');
                }
            });
        });

        // Compatibility shim for legacy API clients that still call fetchWithProfile.
        // Cookies are included automatically by fetch for same-origin requests.
        window.fetchWithProfile = function(url, options = {}) {
            return fetch(url, options);
        };

        // Note: parseDateOnly and other utilities are now in /static/js/utils.js

        // Check if profile is selected AND exists on page load (except on /profiles page)
        document.addEventListener('DOMContentLoaded', async () => {
            const currentPath = window.location.pathname;
            const profileId = window.streakletCookies.get('profile_id');

            // If no profile selected, redirect to profile selection
            if (currentPath !== '/profiles' && !profileId) {
                window.location.href = '/profiles';
                return;
            }

            // If profile is selected, validate it still exists in database
            if (currentPath !== '/profiles' && profileId) {
                try {
                    await api.profiles.get(profileId);
                } catch (error) {
                    if (error && error.status === 404) {
                        // Profile doesn't exist anymore - clear and redirect
                        console.warn(`Profile ${profileId} not found, redirecting to profile selection`);
                        window.streakletCookies.remove('profile_id');
                        window.streakletCookies.remove('profile_name');
                        window.location.href = '/profiles';
                    } else {
                        console.error('Error validating profile:', error);
                    }
                }
            }
        });

        // Register service worker for PWA support with update prompts
        if ('serviceWorker' in navigator) {
            let swUpdatePromptShown = false;
            const isLocalDevHost = ['localhost', '127.0.0.1', '::1'].includes(window.location.hostname);

            function promptForServiceWorkerUpdate(registration) {
                if (swUpdatePromptShown || !registration.waiting) return;
                swUpdatePromptShown = true;

                const shouldReload = window.confirm(
                    'A new version of Streaklet is available. Reload now to update?'
                );

                if (shouldReload) {
                    registration.waiting.postMessage({ type: 'SKIP_WAITING' });
                }
            }

            window.addEventListener('load', () => {
                if (isLocalDevHost) {
                    Promise.resolve()
                        .then(async () => {
                            const registrations = await navigator.serviceWorker.getRegistrations();
                            await Promise.all(registrations.map((registration) => registration.unregister()));

                            if ('caches' in window) {
                                const cacheNames = await caches.keys();
                                const streakletCaches = cacheNames.filter((name) => name.startsWith('streaklet-'));
                                await Promise.all(streakletCaches.map((name) => caches.delete(name)));
                            }

                            console.log('[PWA] Service worker disabled on localhost for faster dev refresh.');
                        })
                        .catch((error) => {
                            console.error('[PWA] Failed to disable local service worker:', error);
                        });
                    return;
                }

                navigator.serviceWorker.register('/sw.js?v={{ cache_bust }}')
                    .then((registration) => {
                        console.log('[PWA] Service Worker registered:', registration.scope);

                        if (registration.waiting) {
                            promptForServiceWorkerUpdate(registration);
                        }

                        registration.addEventListener('updatefound', () => {
                            const newWorker = registration.installing;
                            if (!newWorker) return;

                            newWorker.addEventListener('statechange', () => {
                                if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                    promptForServiceWorkerUpdate(registration);
                                }
                            });
                        });

                        // Check for updates periodically while the app is open.
                        window.setInterval(() => {
                            registration.update().catch(() => {});
                        }, 60 * 60 * 1000);
                    })
                    .catch((error) => {
                        console.error('[PWA] Service Worker registration failed:', error);
                    });
            });

            let refreshing = false;
            navigator.serviceWorker.addEventListener('controllerchange', () => {
                if (isLocalDevHost) return;
                if (refreshing) return;
                refreshing = true;
                window.location.reload();
            });
        }
    </script>
</head>
<body>
    <!-- Profile Indicator -->
    <div class="profile-indicator" x-data="{profileName: $store.profile.name || 'Default Profile', profileColor: '#3b82f6'}"
         x-init="async () => {
            if ($store.profile.id) {
                try {
                    const profile = await api.profiles.get($store.profile.id);
                    profileName = profile.name;
                    profileColor = profile.color;
                    $el.style.setProperty('--profile-color', profileColor);
                } catch (e) {}
            }
         }">
        <div class="profile-indicator-content">
            <div class="profile-indicator-dot"></div>
            <span x-text="profileName"></span>
        </div>
    </div>

    {% block content %}{% endblock %}

    <nav class="nav" x-data="{ fitbitConnected: false, customListsEnabled: false }" x-init="async () => {
        const profileId = window.streakletCookies.get('profile_id');
        if (profileId) {
            try {
                const data = await api.fitbit.connection();
                fitbitConnected = data.connected;
            } catch (e) {}

            try {
                const lists = await api.customLists.list(false);
                customListsEnabled = Array.isArray(lists) && lists.length > 0;
            } catch (e) {}
        }
    }">
        <a href="/" class="nav-item {{ 'active' if request.url.path == '/' else '' }}" title="Today's Checklist">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M9 11l3 3L22 4"></path>
                <path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"></path>
            </svg>
            <span class="nav-label">Today</span>
        </a>
        <a href="/household" class="nav-item {{ 'active' if request.url.path == '/household' else '' }}" title="Household Tasks">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"></path>
                <polyline points="9 22 9 12 15 12 15 22"></polyline>
            </svg>
            <span class="nav-label">Household</span>
        </a>
        <a x-show="customListsEnabled" href="/lists" class="nav-item {{ 'active' if request.url.path == '/lists' else '' }}" title="Custom Lists">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M4 6h16"></path>
                <path d="M4 12h16"></path>
                <path d="M4 18h16"></path>
            </svg>
            <span class="nav-label">Lists</span>
        </a>
        <a x-show="fitbitConnected" href="/fitbit" class="nav-item {{ 'active' if request.url.path == '/fitbit' else '' }}" title="Fitbit Metrics">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M22 12h-4l-3 9L9 3l-3 9H2"></path>
            </svg>
            <span class="nav-label">Fitbit</span>
        </a>
        <a href="/settings" class="nav-item {{ 'active' if request.url.path == '/settings' or request.url.path == '/profiles' else '' }}" title="Settings & Integrations">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="3"></circle>
                <path d="M12 1v6m0 6v6m5.2-13.2l-4.3 4.3m-3.9 3.9L4.8 19.2M23 12h-6m-6 0H1m18.2 5.2l-4.3-4.3m-3.9-3.9L4.8 4.8"></path>
            </svg>
            <span class="nav-label">Settings</span>
        </a>
    </nav>
</body>
</html>
